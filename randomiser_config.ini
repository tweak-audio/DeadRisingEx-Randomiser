; ─────────────────────────────────────────────────────────────────────────────
;  Dead Rising EX Randomiser Config
;  Place this file in the same folder as the game executable / DLL.
;  All values default to true / 0 if this file or a key is absent.
; ─────────────────────────────────────────────────────────────────────────────

[Checks]
; Non-photo check type toggles
ClothingChecks=true
; false = zones open from the start, no AreaKey rewards placed in the reward map
AreaKeyRewards=true
; false = key item pickups (e.g. MT Key) pass through to vanilla zone unlock, no randomisation
KeyItemRewards=true
; false = no time chunk rewards placed, time gating disabled (all time periods open)
TimeChunks=true
; true = 6-hour chunks (11 rewards), false = 12-hour chunks (5 rewards). Only applies when TimeChunks=true.
SixHourChunks=true
; false = Frank runs at normal speed (no speed boost on level-up)
FastFrank=true
; Speed when FastFrank=true. Options: Normal, Fast, VeryFast, Max
FastFrankSpeed=Max
; false = Frank keeps his default outfit at game start
RandomiseStartingOutfit=true

[PhotoSanity]
; PhotoSanity=true  forces ALL photo check types ON, overriding the three toggles below.
; PhotoSanity=false lets the three toggles below decide independently.
PhotoSanity=true
PPStickerChecks=true
SurvivorPhotoChecks=true
PsychopathPhotoChecks=true

[Seed]
; 0 = generate a new random seed each run.
; Any non-zero value = use this exact seed (same reward map every run).
Seed=0
